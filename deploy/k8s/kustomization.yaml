apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml
  # secret.example.yaml is NOT included; operators provide their own secret.
  # networkpolicy.example.yaml is NOT included by default. Add it from an
  # overlay after replacing namespace and Honcho API selectors for your cluster.
  # servicemonitor.yaml is NOT included by default. Add it here in an overlay
  # if the Prometheus Operator is installed and you want metrics scraping.

labels:
  - pairs:
      app.kubernetes.io/name: honcho-dashboard
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

images:
  - name: ghcr.io/iuliandita/honcho-dashboard
    newTag: 1.6.1
