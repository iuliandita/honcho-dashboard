apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml
  # secret.example.yaml is NOT included; operators provide their own secret.

commonLabels:
  app.kubernetes.io/name: honcho-dashboard
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/REPLACE_ME/honcho-dashboard
    newTag: latest
