# DO NOT APPLY THIS FILE — example only.
# Replace the placeholders and either:
#   1) seal it with kubeseal -> SealedSecret (preferred for GitOps)
#   2) apply via `kubectl create secret generic honcho-dashboard-secret --from-literal=...`
# Generate the password hash with:
#   DASHBOARD_AUTH_PASSWORD='replace-me' \
#     bun -e 'console.log(await Bun.password.hash(process.env.DASHBOARD_AUTH_PASSWORD ?? ""))'
apiVersion: v1
kind: Secret
metadata:
  name: honcho-dashboard-secret
  labels:
    app.kubernetes.io/name: honcho-dashboard
type: Opaque
stringData:
  HONCHO_ADMIN_TOKEN: 'REPLACE_ME_with_real_admin_token'
  DASHBOARD_SESSION_SECRET: 'REPLACE_ME_with_32_plus_random_chars'
  DASHBOARD_AUTH_PASSWORD_HASH: 'REPLACE_ME_with_bun_password_hash'
