image:
  repository: ghcr.io/iuliandita/honcho-dashboard
  tag: ''                             # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

honcho:
  apiBase: 'https://REPLACE_ME-honcho.example.com'
  workspaceId: ''                     # empty = picker mode
  proxyTimeout: 15

dashboardAuth:
  mode: 'off'                         # off or password
  password: ''                        # plaintext option for simple installs
  passwordHash: ''                    # preferred for production-like installs
  sessionSecret: ''                   # required when mode=password
  sessionTtlSeconds: 43200

logLevel: info
port: 3000

secret:
  create: true                        # set false to provide your own secret externally
  adminToken: ''                      # required when create=true; set via --set or values override
  existingSecretName: ''              # set when create=false to reference your own secret

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: REPLACE_ME.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: honcho-dashboard-tls
      hosts:
        - REPLACE_ME.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

replicaCount: 1
nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  enabled: false                      # set true to render a Prometheus Operator ServiceMonitor
  path: /metrics                      # scrape path; the dashboard does not yet expose /metrics
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}                # extra labels for the ServiceMonitor (e.g. release: kube-prometheus-stack)
