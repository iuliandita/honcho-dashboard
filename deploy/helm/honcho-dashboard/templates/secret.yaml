{{- if .Values.secret.create }}
{{- if and (eq .Values.dashboardAuth.mode "password") (not .Values.dashboardAuth.password) (not .Values.dashboardAuth.passwordHash) }}
{{- fail "dashboardAuth.password or dashboardAuth.passwordHash required when dashboardAuth.mode=password" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "honcho-dashboard.secretName" . }}
  labels:
    {{- include "honcho-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  HONCHO_ADMIN_TOKEN: {{ required "secret.adminToken required when secret.create=true" .Values.secret.adminToken | quote }}
  {{- if eq .Values.dashboardAuth.mode "password" }}
  DASHBOARD_SESSION_SECRET: {{ required "dashboardAuth.sessionSecret required when dashboardAuth.mode=password" .Values.dashboardAuth.sessionSecret | quote }}
  {{- if .Values.dashboardAuth.password }}
  DASHBOARD_AUTH_PASSWORD: {{ .Values.dashboardAuth.password | quote }}
  {{- end }}
  {{- if .Values.dashboardAuth.passwordHash }}
  DASHBOARD_AUTH_PASSWORD_HASH: {{ .Values.dashboardAuth.passwordHash | quote }}
  {{- end }}
  {{- end }}
{{- end }}
