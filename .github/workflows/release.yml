name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  BUN_VERSION: '1.3.11'
  TRIVY_VERSION: '0.58.2'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "$BUN_VERSION"

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag values
        id: tag
        env:
          REF: ${{ github.ref }}
        run: |
          TAG=${REF#refs/tags/}            # v1.2.3
          VERSION=${TAG#v}                 # 1.2.3
          MAJOR=${VERSION%%.*}             # 1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: test "${{ steps.tag.outputs.version }}" = "$(bun -e "console.log(require('./package.json').version)")"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.major }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan published image
        run: |
          docker run --rm "aquasec/trivy:${TRIVY_VERSION}" \
            image --severity HIGH,CRITICAL --exit-code 1 --no-progress \
            "ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}"

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: sbom.spdx.json
