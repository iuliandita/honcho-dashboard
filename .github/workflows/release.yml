name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  BUN_VERSION: '1.3.11'
  TRIVY_VERSION: '0.58.2'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "$BUN_VERSION"

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag values
        id: tag
        env:
          REF: ${{ github.ref }}
        run: |
          TAG=${REF#refs/tags/}            # v1.2.3
          VERSION=${TAG#v}                 # 1.2.3
          MAJOR=${VERSION%%.*}             # 1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: test "${{ steps.tag.outputs.version }}" = "$(bun -e "console.log(require('./package.json').version)")"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.major }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan published image
        run: |
          docker run --rm "aquasec/trivy:${TRIVY_VERSION}" \
            image --severity HIGH,CRITICAL --exit-code 1 --no-progress \
            "ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}"

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: sbom.spdx.json
