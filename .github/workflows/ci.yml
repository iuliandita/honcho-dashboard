name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.11'
  GITLEAKS_VERSION: '8.24.2'
  SEMGREP_VERSION: '1.101.0'
  TRIVY_VERSION: '0.58.2'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "$BUN_VERSION"

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test:coverage

      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version
        run: test "$(bun --version)" = "$BUN_VERSION"

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        run: bun run test:e2e:install

      - name: e2e
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  helm-k8s-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.0

      - name: Helm lint
        run: helm lint deploy/helm/honcho-dashboard

      - name: Install YAML parser
        run: python -m pip install --user PyYAML==6.0.2

      - name: Render Helm to YAML
        run: |
          mkdir -p /tmp/helm-rendered
          printf '%s' ci-token > /tmp/honcho-admin-token
          helm template ci deploy/helm/honcho-dashboard \
            --set honcho.apiBase=https://example.com \
            --set-file secret.adminToken=/tmp/honcho-admin-token \
            --set image.repository=ghcr.io/REPLACE_ME/honcho-dashboard \
            > /tmp/helm-rendered/all.yaml

      - name: Verify Helm output is valid YAML
        run: |
          python - <<'PY'
          import yaml
          with open('/tmp/helm-rendered/all.yaml', encoding='utf-8') as f:
              docs = [doc for doc in yaml.safe_load_all(f) if doc]
          assert docs and all('kind' in doc for doc in docs)
          PY

      - name: Verify plain manifests parse
        run: |
          python - <<'PY'
          import glob
          import yaml
          for path in glob.glob('deploy/k8s/*.yaml'):
              with open(path, encoding='utf-8') as f:
                  docs = [doc for doc in yaml.safe_load_all(f) if doc]
              assert docs and all('kind' in doc for doc in docs), path
          PY

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Secret scan
        run: gitleaks dir . --redact --verbose

      - name: Install semgrep
        run: python -m pip install --user "semgrep==${SEMGREP_VERSION}"

      - name: SAST scan
        run: semgrep scan --config auto --error .

      - name: Filesystem vulnerability scan
        run: |
          docker run --rm -v "$PWD:/src" "aquasec/trivy:${TRIVY_VERSION}" \
            fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --no-progress /src

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: honcho-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
