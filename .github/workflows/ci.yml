name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Codegen
        run: |
          bun run codegen
          git diff --exit-code src/lib/honcho/types.ts

      - name: Install Playwright browsers
        run: bun run test:e2e:install

      - name: e2e
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  helm-k8s-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Helm lint
        run: helm lint deploy/helm/honcho-dashboard

      - name: Render Helm to YAML
        run: |
          mkdir -p /tmp/helm-rendered
          printf '%s' ci-token > /tmp/honcho-admin-token
          helm template ci deploy/helm/honcho-dashboard \
            --set honcho.apiBase=https://example.com \
            --set-file secret.adminToken=/tmp/honcho-admin-token \
            --set image.repository=ghcr.io/REPLACE_ME/honcho-dashboard \
            > /tmp/helm-rendered/all.yaml

      - name: Verify Helm output is valid YAML
        run: yq eval -e '.kind' /tmp/helm-rendered/all.yaml > /dev/null

      - name: Verify plain manifests parse
        run: |
          for f in deploy/k8s/*.yaml; do
            yq eval -e '.kind' "$f" > /dev/null
          done

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: honcho-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
