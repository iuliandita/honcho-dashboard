name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Codegen
        run: bun run codegen

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  helm-k8s-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Helm lint
        run: helm lint deploy/helm/honcho-dashboard

      - name: Render Helm to YAML
        run: |
          mkdir -p /tmp/helm-rendered
          helm template ci deploy/helm/honcho-dashboard \
            --set honcho.apiBase=https://example.com \
            --set secret.adminToken=ci-token \
            --set image.repository=ghcr.io/REPLACE_ME/honcho-dashboard \
            > /tmp/helm-rendered/all.yaml

      - name: Verify Helm output is valid YAML
        run: yq eval -e '.kind' /tmp/helm-rendered/all.yaml > /dev/null

      - name: Verify plain manifests parse
        run: |
          for f in deploy/k8s/*.yaml; do
            yq eval -e '.kind' "$f" > /dev/null
          done

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: honcho-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
