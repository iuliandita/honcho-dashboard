version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    commit-message:
      prefix: ci
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:30'
      timezone: Europe/Berlin
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
    groups:
      bun-dependencies:
        patterns:
          - '*'
